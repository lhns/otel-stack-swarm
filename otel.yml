version: '3.8'

services:
  opentelemetry-collector:
    image: ${DOCKER_PROXY:-}otel/opentelemetry-collector-contrib:0.147.0
    command: --config /etc/otelcol-contrib/config.yaml --feature-gates transform.flatten.logs
    environment:
      TZ: 'Europe/Berlin'
    volumes:
      - ${DATA_PATH}/otel/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "2003:2003"
      - "4317:4317"
      - "4318:4318"
      - "8006:8006"
      - "8086:8086"
      - "13133:13133"
      - "14250:14250"
      - "14268:14268"
      - "54526:54526"
      - "54526:54526/udp"
    networks:
      - internal
      - web
    deploy:
      update_config:
        order: start-first

  kafka:
    image: ${DOCKER_PROXY:-}bitnami/kafka:4.0
    stop_grace_period: 300s
    environment:
      TZ: 'Europe/Berlin'
      KAFKA_CFG_NODE_ID: '1'
      KAFKA_CFG_PROCESS_ROLES: 'broker,controller'
      KAFKA_CFG_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CFG_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: '1@127.0.0.1:9093'
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: 'false'
      ALLOW_PLAINTEXT_LISTENER: 'yes'
    healthcheck:
      disable: true
    volumes:
      - ${DATA_PATH}/kafka:/bitnami/kafka
    ports:
      - "9092:9092"
    networks:
      - internal
      - web

  kafka-cli:
    image: ${DOCKER_PROXY:-}apache/kafka
    command: tail -f /dev/null
    networks:
      - internal
    deploy:
      replicas: 0

  trace-processor:
    image: ${DOCKER_PROXY:-}otel/opentelemetry-collector-contrib:0.147.0
    environment:
      TZ: 'Europe/Berlin'
    volumes:
      - ${DATA_PATH}/otel/trace-processor.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - internal

networks:
  internal:
    driver: overlay
  web:
    external: true
    name: traefik_web

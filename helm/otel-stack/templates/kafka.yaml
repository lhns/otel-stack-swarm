{{- if .Values.kafka.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.kafka.name }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  selector:
    app.kubernetes.io/component: kafka
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: kafka
      port: {{ .Values.kafka.service.port }}
      targetPort: kafka
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: kafka
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: kafka
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.kafka.terminationGracePeriodSeconds }}
      containers:
        - name: kafka
          image: {{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          env:
            {{- range .Values.kafka.extraEnvVars }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          ports:
            - name: kafka
              containerPort: {{ .Values.kafka.service.port }}
              protocol: TCP
            - name: controller
              containerPort: 9093
              protocol: TCP
          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}
          volumeMounts:
            - name: kafka-data
              mountPath: /bitnami/kafka
      volumes:
        - name: kafka-data
          {{- if .Values.kafka.persistence.enabled }}
          persistentVolumeClaim:
            claimName: kafka-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.kafka.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-data
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.kafka.persistence.size }}
  {{- if .Values.kafka.persistence.storageClassName }}
  storageClassName: {{ .Values.kafka.persistence.storageClassName }}
  {{- end }}
{{- end }}
{{- end }}
